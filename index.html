<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TI Draft - April 18th</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('starry_sky_during_nighttime_space_hd_galaxy.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #e0e0e0;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: -1;
        }

        .container { max-width: 900px; margin: 0 auto; position: relative; }
        
        header { 
            text-align: center; 
            padding: 20px; 
            margin-bottom: 20px; 
            background: rgba(26, 28, 44, 0.8);
            border: 1px solid rgba(255, 204, 0, 0.3);
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }
        
        h1 { color: #ffcc00; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 15px rgba(255, 204, 0, 0.5); margin: 0; }

        /* Navigation Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }
        .tab-btn {
            background: rgba(42, 45, 69, 0.9);
            color: white;
            border: 1px solid #ffcc00;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .tab-btn.active { background: #ffcc00; color: #000; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .faction-card {
            background: rgba(26, 28, 44, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .faction-header {
            background: rgba(42, 45, 69, 0.95);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 204, 0, 0.2);
        }

        .player-tag { 
            background: #ffcc00; 
            color: black; 
            font-weight: bold; 
            padding: 4px 12px; 
            border-radius: 4px;
            font-size: 0.85em;
        }

        .speaker-number { color: #aaa; font-size: 0.85em; font-weight: bold; }

        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .image-box img { max-width: 100%; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .full-map-img { width: 100%; border-radius: 8px; border: 2px solid #ffcc00; }

        h2 { color: #fff; margin: 0; font-size: 1.4em; }
        a { color: #ffcc00; text-decoration: none; font-weight: bold; }

        @media (max-width: 600px) { .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TI Draft: April 18th</h1>
        <p>The Factions have been chosen. Prepare for war.</p>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'drafted')">Drafted</button>
        <button class="tab-btn" onclick="openTab(event, 'map')">Full Map</button>
        <button class="tab-btn" onclick="openTab(event, 'not-drafted')">Not Drafted</button>
    </nav>

    <div id="drafted" class="tab-content active">
        
        <div class="faction-card">
            <div class="faction-header"><h2>Naaz-Rokha Alliance</h2><div class="player-tag">VALERIO</div></div>
            <div class="content-grid">
                <div class="image-box"><img src="r_naazrokha.jpg"></div>
                <div class="image-box"><img src="NR-Slice.png"></div>
            </div>
        </div>

        <div class="faction-card">
            <div class="faction-header"><h2>Federation of Sol</h2><div class="player-tag">RICO</div></div>
            <div class="content-grid">
                <div class="image-box"><img src="solfederation.jpg"></div>
                <div class="image-box"><img src="Sol-Slice.png"></div>
            </div>
        </div>

        <div class="faction-card">
            <div class="faction-header"><h2>The Ghosts of Creuss</h2><div class="player-tag">ALBERTO</div></div>
            <div class="content-grid">
                <div class="image-box"><img src="r_creuss.jpg"></div>
                <div class="image-box"><img src="Ghost-Slice.png"></div>
            </div>
        </div>

        <div class="faction-card">
            <div class="faction-header"><h2>Barony of Letnev</h2><div class="player-tag">ARIANA</div></div>
            <div class="content-grid">
                <div class="image-box"><img src="r_letnev.jpg"></div>
                <div class="image-box"><img src="Barony-Slice.png"></div>
            </div>
        </div>

        <div class="faction-card">
            <div class="faction-header"><h2>The Empyrean</h2><div class="player-tag">NICOLA</div></div>
            <div class="content-grid">
                <div class="image-box"><img src="r_empyrean.jpg"></div>
                <div class="image-box"><img src="Empyrean-Slice.png"></div>
            </div>
        </div>

        <div class="faction-card">
            <div class="faction-header"><h2>The Last Bastion</h2><div class="player-tag">DRAFTED</div></div>
            <div class="content-grid">
                <div class="image-box"><img src="r_last_bastion.jpg"></div>
                <div class="image-box"><img src="Last Bastion Slice.png"></div>
            </div>
        </div>
    </div>

    <div id="map" class="tab-content">
        <div class="faction-card" style="padding: 20px; text-align: center;">
            <img src="full map.png" class="full-map-img" alt="Full Galaxy Map">
        </div>
    </div>

    <div id="not-drafted" class="tab-content">
        <div class="faction-card">
            <div class="faction-header"><h2>Emirates of Hacan</h2></div>
            <div class="content-grid">
                <div class="image-box"><img src="r_hacan.jpg"></div>
                <div class="image-box"><img src="Hacan-Slice.png"></div>
            </div>
        </div>

        <div class="faction-card">
            <div class="faction-header"><h2>Xxcha Kingdom</h2></div>
            <div class="content-grid">
                <div class="image-box"><img src="r_xxcha.jpg"></div>
                <div class="image-box"><img src="xxcha slice.png"></div>
            </div>
        </div>

        <div class="faction-card">
            <div class="faction-header"><h2>Sardakk N’orr</h2></div>
            <div class="content-grid">
                <div class="image-box"><img src="r_norr.jpg"></div>
                <div class="image-box"><img src="Sardakk-Slice.png"></div>
            </div>
        </div>
    </div>

</div>

<script>
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }
</script>

</body>
</html>

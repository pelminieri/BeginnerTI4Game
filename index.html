<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TI Draft - April 12th</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0d17;
            color: #e0e0e0;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; padding: 20px; border-bottom: 2px solid #444; margin-bottom: 30px; }
        h1 { color: #ffcc00; text-transform: uppercase; letter-spacing: 2px; }
        
        .info-box {
            background: #2a2d45;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #ffcc00;
            text-align: left;
        }
        .btn {
            display: inline-block;
            background: #ffcc00;
            color: #000;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 15px;
        }

        .faction-card {
            background: #1a1c2c;
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 40px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .faction-header {
            background: #2a2d45;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .speaker-number { background: #ffcc00; color: black; font-weight: bold; padding: 5px 12px; border-radius: 20px; }
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .image-box { text-align: center; }
        .image-box img { max-width: 100%; border-radius: 4px; border: 1px solid #444; }
        .description { padding: 0 20px 20px 20px; }
        h2, h3 { color: #fff; margin-top: 0; }
        a { color: #ffcc00; text-decoration: none; }
        a:hover { text-decoration: underline; }

        @media (max-width: 600px) { .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TI Draft: April 12th</h1>
        <p>Welcome to our Beginner Friendly Session! Prepare for a day of galactic conquest.</p>
